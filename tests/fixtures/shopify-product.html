<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopify Fixture</title>
    <meta name="shopify-digital-wallet" content="/wallets/checkouts.js" />
    <meta property="og:image" content="https://cdn.shopify.test/tote.jpg" />
    <meta property="product:brand" content="North Studio" />
    <meta property="product:availability" content="in stock" />
  </head>
  <body>
    <main class="product">
      <h1 class="product__title">North Studio Canvas Tote</h1>
      <div class="price-item--regular">$48.00</div>
      <div class="product-form__inventory">Disponible para envio inmediato</div>
      <div class="product__media"><img src="https://cdn.shopify.test/tote.jpg" alt="Canvas tote" /></div>
      <p id="description">Heavy canvas tote bag with inside pocket and reinforced handle.</p>
      <script>window.Shopify = { theme: { name: 'Mock' } };</script>
    </main>
  </body>
</html>
