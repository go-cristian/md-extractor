<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Amazon Fixture</title>
  </head>
  <body>
    <div id="dp-container">
      <span id="productTitle">Sony WH-1000XM5 Wireless Headphones</span>
      <div id="corePriceDisplay_desktop_feature_div">
        <span class="a-price"><span class="a-offscreen">$399.99</span></span>
      </div>
      <a id="sellerProfileTriggerId">Sony Store</a>
      <div id="acrPopover"><span aria-hidden="true">4.7 out of 5 stars</span></div>
      <div id="availability"><span>In Stock</span></div>
      <img id="landingImage" src="https://images.amazon.test/sony.jpg" alt="Sony headphones" />
      <p id="description">Industry-leading noise cancelling with premium sound.</p>
    </div>
  </body>
</html>
